server:
  port: ${MEDITATION_BACKEND_PORT:8080}
  address: 127.0.0.1

spring:
  application:
    name: meditation-backend
  datasource:
    url: jdbc:h2:file:${MEDITATION_H2_DB_DIR:../local-data/h2}/${MEDITATION_H2_DB_NAME:meditation};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

meditation:
  backend:
    sync:
      clock-skew-tolerance-seconds: 300
    media:
      root: ${MEDITATION_MEDIA_STORAGE_ROOT:../local-data/media}
      custom-play-subdirectory: custom-plays
      sound-subdirectory: sounds
      public-path-prefix: /media
